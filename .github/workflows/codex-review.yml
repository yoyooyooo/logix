name: codex-review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ secrets.OPENAI_BASE_URL }}
          prompt: |
            你是本仓库代码评审助手，请只基于当前 PR 改动做审查。
            输出要求（Markdown）：
            1) 先列高风险/高收益问题（按严重度排序）
            2) 每条给出“问题 + 原因 + 建议修复”
            3) 明确指出是否影响性能、内存、并发事务语义、可诊断性
            4) 若未发现关键问题，输出：No critical issues found.

      - name: Upsert PR review comment
        if: ${{ steps.codex.outputs.final-message != '' }}
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW: ${{ steps.codex.outputs.final-message }}
        with:
          script: |
            const marker = '<!-- codex-review -->'
            const body = `${marker}\n## Codex Review\n\n${process.env.CODEX_REVIEW}`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
