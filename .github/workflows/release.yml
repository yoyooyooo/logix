name: Release

on:
  push:
    tags:
      - "logix-v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing logix-v* tag to publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CI: true
      TURBO_TELEMETRY_DISABLED: "1"
      RELEASE_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG_NAME }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@11.5.1

      - name: Show tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG_NAME}" =~ ^logix-v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc|canary)(\.[0-9A-Za-z]+)*)?$ ]] \
            || { echo "Invalid release tag: ${RELEASE_TAG_NAME}"; exit 1; }

      - name: Verify release lane
        run: pnpm ci:release

      - name: Install Playwright Chromium deps
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser release smoke
        run: pnpm test:browser:release

      - name: Publish tagged release
        run: pnpm release:publish --tag-name "$RELEASE_TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
